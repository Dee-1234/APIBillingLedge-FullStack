spring.application.name=APIBillingLedger

server.port=8080

# MySQL Connection
spring.datasource.url=jdbc:mysql://localhost:3306/api_billing_ledger?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username={USERNAME}
spring.datasource.password={PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway (Database Migrations)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

jwt.secret={"YOUR-SECRET-KEY"}

stripe.api.key={YOUR-PAYMENT-INTERFACE-KEY}
